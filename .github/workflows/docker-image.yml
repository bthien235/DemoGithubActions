name: Docker Image

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: demogithubaction

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: thiennt04
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: thiennt04/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to DevOps Classroom
        run: |
          REPO="layers/thiennt04"
          CONTAINER_PORT=80
          MAX_RETRIES=3
          SLEEP_SECONDS=15

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Deploy attempt $i/$MAX_RETRIES"
            RESPONSE=$(curl -sS --connect-timeout 10 --max-time 120 -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=1&container_port=$CONTAINER_PORT&strict_container_port=0")
            BODY=$(echo "$RESPONSE" | sed '$d')
            CODE=$(echo "$RESPONSE" | tail -n1)
            echo "Webhook HTTP: $CODE"

            if [ "$CODE" -ge 200 ] && [ "$CODE" -lt 300 ]; then
              echo "Deploy succeeded."
              echo "::group::Webhook JSON"
              echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
              echo "::endgroup::"
              exit 0
            fi

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Deploy not successful yet, waiting $SLEEP_SECONDS seconds before retry..."
              sleep "$SLEEP_SECONDS"
            fi
          done

          echo "Deploy failed after $MAX_RETRIES attempts."
          echo "::group::Webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
          exit 1
