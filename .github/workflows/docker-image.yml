name: Docker Image

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: demogithubaction

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: thiennt04
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: thiennt04/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to DevOps Classroom
        env:
          REPO: thiennt04/demogithubaction
          CONTAINER_PORT: "80"
        run: |
          set -euo pipefail
          DEPLOY_URL="${{ secrets.DEPLOY_URL }}?repo=${REPO}&tag=latest&slot=1&container_port=${CONTAINER_PORT}&strict_container_port=0"
          MAX_ATTEMPTS=3
          RETRY_DELAY_SECONDS=20

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "Deploy attempt ${attempt}/${MAX_ATTEMPTS}"
            RESPONSE="$(curl -sS -w "\n%{http_code}" -X POST \
              --connect-timeout 10 \
              --max-time 110 \
              "$DEPLOY_URL" || true)"

            BODY="$(echo "$RESPONSE" | sed '$d')"
            CODE="$(echo "$RESPONSE" | tail -n1)"
            echo "Webhook HTTP: $CODE"

            if [[ "$CODE" =~ ^2[0-9]{2}$ ]]; then
              echo "Deploy succeeded."
              echo "::group::Webhook response"
              echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
              echo "::endgroup::"
              exit 0
            fi

            echo "::group::Webhook response (attempt ${attempt})"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"

            if [[ "$CODE" == "524" || "$CODE" == "429" || "$CODE" =~ ^5[0-9]{2}$ ]]; then
              if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
                echo "Transient deploy error ($CODE). Waiting ${RETRY_DELAY_SECONDS}s before retry..."
                sleep "$RETRY_DELAY_SECONDS"
                continue
              fi
            fi

            echo "Deploy failed with HTTP $CODE."
            exit 1
          done
